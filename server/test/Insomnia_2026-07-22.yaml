      description: >-
        This collection contains the API endpoints for the Komiku application.
        It is organized around the main resources of the system, including
        users, categories, comics, chapters, chapter pages, comments, replies,
        and ratings.


        The collection supports common application workflows such as user
        registration and login, content management, comic browsing, chapter and
        page retrieval, and community interactions through comments, replies,
        and ratings. It also includes a dedicated end-to-end section for testing
        complete multi-step scenarios across the API.


        Overall, this collection is intended to help with development, manual
        testing, and validation of the full Komiku backend workflow from
        authentication to content and interaction management.
